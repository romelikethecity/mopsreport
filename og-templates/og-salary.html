<!DOCTYPE html>
<!--
  MOps Report — OG Salary Template
  Render at 1200x630 pixels. Salary pages with stat callout.
  Placeholders: {{TITLE}}, {{SUBTITLE}} (salary range), {{CATEGORY}}
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Source+Code+Pro:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }
  .og-card {
    width: 1200px;
    height: 630px;
    background: #0F172A;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 56px 64px;
  }
  .og-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }
  .og-card::after {
    content: '';
    position: absolute;
    bottom: 0;
    right: 0;
    width: 500px;
    height: 300px;
    background: radial-gradient(ellipse at bottom right, rgba(8,145,178,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 1;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo-text {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: #F0F0F0;
    letter-spacing: -0.5px;
  }
  .logo-text span { color: #0891B2; }
  .domain {
    font-family: 'Source Code Pro', monospace;
    font-size: 14px;
    color: #6B6B6B;
    letter-spacing: 1px;
  }
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: flex-end;
    gap: 48px;
  }
  .content-left {
    flex: 1;
  }
  .category-label {
    font-family: 'Source Code Pro', monospace;
    font-size: 13px;
    font-weight: 500;
    color: #22D3EE;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .title {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 52px;
    color: #FFFFFF;
    line-height: 1.15;
    letter-spacing: -1px;
    margin-bottom: 16px;
    max-width: 700px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .accent-bar {
    width: 80px;
    height: 4px;
    background: #0891B2;
    border-radius: 2px;
  }
  .stat-callout {
    flex-shrink: 0;
    text-align: right;
    padding-bottom: 8px;
  }
  .stat-value {
    font-family: 'Source Code Pro', monospace;
    font-size: 64px;
    font-weight: 600;
    color: #0891B2;
    line-height: 1;
    white-space: nowrap;
  }
  .stat-label {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: #6B6B6B;
    margin-top: 8px;
  }
  .deco-wave {
    position: absolute;
    right: 64px;
    bottom: 80px;
    opacity: 0.15;
  }
</style>
</head>
<body>
  <div class="og-card">
    <div class="top-bar">
      <div class="logo">
        <svg width="40" height="40" viewBox="0 0 36 36">
          <rect width="36" height="36" rx="8" fill="#0891B2"/>
          <circle cx="12" cy="12" r="3" fill="#fff"/>
          <circle cx="24" cy="12" r="3" fill="#fff"/>
          <circle cx="18" cy="24" r="3" fill="#fff"/>
          <line x1="12" y1="12" x2="24" y2="12" stroke="#fff" stroke-width="1.5"/>
          <line x1="12" y1="12" x2="18" y2="24" stroke="#fff" stroke-width="1.5"/>
          <line x1="24" y1="12" x2="18" y2="24" stroke="#fff" stroke-width="1.5"/>
        </svg>
        <div class="logo-text">MOps <span>Report</span></div>
      </div>
      <div class="domain">MOPSREPORT.COM</div>
    </div>
    <div class="content">
      <div class="content-left">
        <div class="category-label">SALARY DATA</div>
        <div class="title">{{TITLE}}</div>
        <div class="accent-bar"></div>
      </div>
      <div class="stat-callout">
        <div class="stat-value">{{SUBTITLE}}</div>
        <div class="stat-label">Salary Range</div>
      </div>
    </div>
    <svg class="deco-wave" width="200" height="60" viewBox="0 0 200 60">
      <polyline points="0,30 30,30 50,10 70,50 90,20 110,40 130,25 160,35 200,30" fill="none" stroke="#0891B2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</body>
</html>
